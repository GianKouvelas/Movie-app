<div style="padding: 20px;">
  <h1>🎬 Movie Search</h1>
  
  <div>
    <input 
      [(ngModel)]="searchQuery" 
      placeholder="Search movies (min 3 characters)..."
      style="width: 300px; padding: 8px; font-size: 16px;"
    />
    <button (click)="onSearch()" style="padding: 8px 16px; margin-left: 8px;">
      Search
    </button>
  </div>

  <div *ngIf="loading">Loading...</div>

  <div style="display: flex; flex-wrap: wrap; gap: 16px; margin-top: 20px;">
    <div *ngFor="let movie of movies" 
         style="width: 150px; cursor: pointer; text-align: center;">
      <img 
        *ngIf="movie.poster_path"
        [src]="'https://image.tmdb.org/t/p/w200' + movie.poster_path" 
        [alt]="movie.title"
        style="width: 150px; height: 225px; object-fit: cover;"
      />
      <p style="font-weight: bold;">{{ movie.title }}</p>
      <p>⭐ {{ movie.vote_average | number:'1.1-1' }}</p>
    </div>
  </div>

  <div *ngIf="movies.length > 0" style="margin-top: 20px;">
    <button (click)="prevPage()" [disabled]="currentPage === 1">Previous</button>
    <span style="margin: 0 16px;">Page {{ currentPage }} of {{ totalPages }}</span>
    <button (click)="nextPage()" [disabled]="currentPage === totalPages">Next</button>
  </div>
</div>

<div *ngFor="let movie of movies" 
     (click)="openMovieDetails(movie.id)"
     style="width: 150px; cursor: pointer; text-align: center;">
